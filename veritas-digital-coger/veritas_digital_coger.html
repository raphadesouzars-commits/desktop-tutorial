/* 2–4. TOKENS, BASE E COMPONENTES ------------------------------------------ */

/* ============================================================
   Corregedoria RFB — Design Tokens
   ============================================================ */
:root {
  /* Brand */
  --rfb-navy-900: #051A3D;
  --rfb-navy-800: #0B2C5F;
  --rfb-navy-700: #14397A;
  --rfb-navy-600: #1E4C99;
  --rfb-navy-500: #2E63B8;
  --rfb-navy-100: #DCE6F4;
  --rfb-navy-50:  #EEF3FA;

  /* Gold accent (institucional) */
  --rfb-gold-700: #8C6E2C;
  --rfb-gold-600: #B58A3D;
  --rfb-gold-500: #C9A35C;
  --rfb-gold-400: #DDBE7E;
  --rfb-gold-200: #F2E2BC;

  /* Surfaces */
  --rfb-bg:          #EFF3F8;
  --rfb-surface:     rgba(255, 255, 255, 0.82);
  --rfb-surface-strong: rgba(255, 255, 255, 0.94);
  --rfb-surface-dim: rgba(255, 255, 255, 0.55);
  --rfb-border:      rgba(11, 44, 95, 0.14);
  --rfb-border-strong: rgba(11, 44, 95, 0.28);
  --rfb-divider:     rgba(11, 44, 95, 0.10);

  /* Text */
  --rfb-text:        #1A2740;
  --rfb-text-muted:  #5B6781;
  --rfb-text-faint:  #8A93A8;
  --rfb-text-on-navy: #F5F7FA;

  /* Status */
  --rfb-success: #1F7A4C;
  --rfb-success-bg: #E2F1E9;
  --rfb-warning: #B7791F;
  --rfb-warning-bg: #FBF2DF;
  --rfb-danger:  #B42318;
  --rfb-danger-bg: #FBE5E2;
  --rfb-info:    #1E4C99;
  --rfb-info-bg: #E1EAF7;

  /* Radii */
  --rfb-r-sm: 4px;
  --rfb-r-md: 8px;
  --rfb-r-lg: 12px;
  --rfb-r-xl: 18px;

  /* Shadows */
  --rfb-shadow-sm: 0 1px 2px rgba(11,44,95,.06), 0 1px 1px rgba(11,44,95,.04);
  --rfb-shadow-md: 0 4px 12px rgba(11,44,95,.08), 0 2px 4px rgba(11,44,95,.04);
  --rfb-shadow-lg: 0 12px 32px rgba(11,44,95,.12), 0 4px 12px rgba(11,44,95,.06);

  /* Spacing scale */
  --rfb-s-1: 4px;
  --rfb-s-2: 8px;
  --rfb-s-3: 12px;
  --rfb-s-4: 16px;
  --rfb-s-5: 20px;
  --rfb-s-6: 24px;
  --rfb-s-8: 32px;
  --rfb-s-10: 40px;
  --rfb-s-12: 48px;

  /* Type */
  --rfb-font-display: "Barlow Condensed", "Arial Narrow", sans-serif;
  --rfb-font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --rfb-font-mono: "JetBrains Mono", "Roboto Mono", ui-monospace, monospace;
}

/* ============================================================
   Base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

.rfb-app {
  font-family: var(--rfb-font-body);
  color: var(--rfb-text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   Background canvas (per artboard)
   A faixa superior do background (logo + brasão) NUNCA é coberta.
   Use --rfb-hero-h para ajustar a altura reservada à arte do topo.
   ============================================================ */
.rfb-canvas {
  --rfb-hero-h: 320px;
  position: relative;
  width: 100%;
  min-height: 100%;
  background:
    /* Imagem de fundo do hero: embutir por ferramenta (ver guia) ou usar o gradiente acima como fallback */
    linear-gradient(180deg, #DCE6F4 0%, #EFF3F8 60%, #F5F7FA 100%);
  overflow: hidden;
}

/* Hero — zona protegida acima do conteúdo (mostra só o fundo) */
.rfb-hero {
  position: relative;
  height: var(--rfb-hero-h);
  pointer-events: none;
}
/* Faixa dourada institucional separando o hero do conteúdo */
.rfb-hero::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--rfb-gold-500) 20%,
    var(--rfb-gold-400) 50%,
    var(--rfb-gold-500) 80%,
    transparent 100%);
  opacity: .9;
}

/* Pílula de usuário flutuante no canto superior direito (não cobre o brasão) */
.rfb-user-pill {
  position: absolute;
  top: 18px;
  right: 24px;
  display: flex; align-items: center; gap: 10px;
  padding: 6px 14px 6px 6px;
  border-radius: 999px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--rfb-border);
  box-shadow: var(--rfb-shadow-sm);
  z-index: 5;
}

/* ============================================================
   Page Title Bar (sob o hero — não cobre a logo do fundo)
   ============================================================ */
.rfb-pagebar {
  position: relative;
  display: flex;
  align-items: center;
  gap: var(--rfb-s-4);
  padding: 14px 32px 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.85) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--rfb-border);
}
.rfb-pagebar__title {
  font-family: var(--rfb-font-display);
  font-weight: 600;
  font-size: 20px;
  letter-spacing: 0.5px;
  color: var(--rfb-navy-800);
  line-height: 1.1;
  text-transform: uppercase;
}
.rfb-pagebar__subtitle {
  font-family: var(--rfb-font-body);
  font-size: 12px;
  letter-spacing: 0.5px;
  color: var(--rfb-text-muted);
  text-transform: uppercase;
  margin-top: 2px;
}
.rfb-pagebar__spacer { flex: 1; }

.rfb-header__avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--rfb-navy-800), var(--rfb-navy-600));
  color: white;
  display: grid; place-items: center;
  font-weight: 600; font-size: 12px;
  letter-spacing: .5px;
}
.rfb-header__user-info { line-height: 1.15; }
.rfb-header__user-name { font-weight: 600; font-size: 13px; color: var(--rfb-navy-900); }
.rfb-header__user-role { font-size: 11px; color: var(--rfb-text-muted); text-transform: uppercase; letter-spacing: .5px; }

/* ============================================================
   Typography
   ============================================================ */
.rfb-h1 { font-family: var(--rfb-font-display); font-weight: 700; font-size: 36px; letter-spacing: .3px; color: var(--rfb-navy-900); line-height: 1.1; text-transform: uppercase; }
.rfb-h2 { font-family: var(--rfb-font-display); font-weight: 600; font-size: 26px; letter-spacing: .4px; color: var(--rfb-navy-800); line-height: 1.15; text-transform: uppercase; }
.rfb-h3 { font-family: var(--rfb-font-display); font-weight: 600; font-size: 18px; letter-spacing: .5px; color: var(--rfb-navy-800); line-height: 1.2; text-transform: uppercase; }
.rfb-eyebrow {
  font-family: var(--rfb-font-body);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--rfb-gold-700);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.rfb-eyebrow::before {
  content: "";
  width: 18px; height: 1px;
  background: var(--rfb-gold-500);
}
.rfb-body { font-size: 14px; color: var(--rfb-text); }
.rfb-body--muted { color: var(--rfb-text-muted); }
.rfb-body--small { font-size: 12px; }

/* ============================================================
   Card
   ============================================================ */
.rfb-card {
  background: var(--rfb-surface);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--rfb-border);
  border-radius: var(--rfb-r-lg);
  box-shadow: var(--rfb-shadow-md);
  overflow: hidden;
}
.rfb-card--solid {
  background: var(--rfb-surface-strong);
}
.rfb-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--rfb-divider);
}
.rfb-card__title {
  font-family: var(--rfb-font-display);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: var(--rfb-navy-800);
  display: flex; align-items: center; gap: 10px;
}
.rfb-card__title::before {
  content: "";
  width: 4px; height: 18px;
  background: var(--rfb-gold-500);
  border-radius: 2px;
}
.rfb-card__body { padding: 20px; }
.rfb-card__footer {
  padding: 12px 20px;
  border-top: 1px solid var(--rfb-divider);
  background: rgba(247, 249, 252, 0.6);
  display: flex; justify-content: flex-end; gap: 10px;
}

/* ============================================================
   Buttons
   ============================================================ */
.rfb-btn {
  font-family: var(--rfb-font-body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .3px;
  padding: 10px 18px;
  border-radius: var(--rfb-r-md);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .15s ease;
  display: inline-flex; align-items: center; gap: 8px;
  white-space: nowrap;
  user-select: none;
}
.rfb-btn:focus-visible {
  outline: 2px solid var(--rfb-gold-500);
  outline-offset: 2px;
}
.rfb-btn--primary {
  background: var(--rfb-navy-800);
  color: white;
}
.rfb-btn--primary:hover { background: var(--rfb-navy-900); transform: translateY(-1px); box-shadow: var(--rfb-shadow-md); }
.rfb-btn--secondary {
  background: white;
  color: var(--rfb-navy-800);
  border-color: var(--rfb-border-strong);
}
.rfb-btn--secondary:hover { background: var(--rfb-navy-50); border-color: var(--rfb-navy-600); }
.rfb-btn--accent {
  background: var(--rfb-gold-500);

}

}

.rfb-btn--danger {
  background: white;
  color: var(--rfb-danger);

}
.rfb-btn--danger:hover { background: var(--rfb-danger-bg); }
.rfb-btn--sm { padding: 6px 12px; font-size: 12px; }
.rfb-btn--lg { padding: 14px 24px; font-size: 14px; }
.rfb-btn[disabled] { opacity: .5; cursor: not-allowed; }

/* ============================================================
   Inputs
   ============================================================ */
.rfb-field { display: flex; flex-direction: column; gap: 6px; }
.rfb-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--rfb-navy-800);
  letter-spacing: .3px;
  text-transform: uppercase;
}
.rfb-label__hint { font-weight: 400; color: var(--rfb-text-muted); text-transform: none; margin-left: 6px; }
.rfb-input, .rfb-select, .rfb-textarea {
  font-family: var(--rfb-font-body);
  font-size: 14px;
  color: var(--rfb-text);
  background: white;
  border: 1px solid var(--rfb-border-strong);
  border-radius: var(--rfb-r-md);
  padding: 10px 12px;
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}
.rfb-input:focus, .rfb-select:focus, .rfb-textarea:focus {
  outline: none;
  border-color: var(--rfb-navy-600);

}
.rfb-input--icon {
  position: relative;
}
.rfb-input--icon .rfb-input { padding-left: 38px; }
.rfb-input--icon svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--rfb-text-muted);
  pointer-events: none;
}
.rfb-help { font-size: 12px; color: var(--rfb-text-muted); }
.rfb-help--error { color: var(--rfb-danger); }

/* Checkbox + radio */
.rfb-check {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--rfb-text);
  cursor: pointer;
}
.rfb-check input { accent-color: var(--rfb-navy-800); width: 16px; height: 16px; }

/* ============================================================
   Badge / Status pill
   ============================================================ */
.rfb-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  font-size: 11px; font-weight: 600;
  letter-spacing: .4px;
  text-transform: uppercase;
  border-radius: 999px;
  border: 1px solid transparent;
}
.rfb-badge__dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.rfb-badge--success  { background: var(--rfb-success-bg); color: var(--rfb-success); border-color: rgba(31,122,76,.22); }
.rfb-badge--warning  { background: var(--rfb-warning-bg); color: var(--rfb-warning); border-color: rgba(183,121,31,.22); }
.rfb-badge--danger   { background: var(--rfb-danger-bg);  color: var(--rfb-danger);  border-color: rgba(180,35,24,.22); }
.rfb-badge--info     { background: var(--rfb-info-bg);    color: var(--rfb-info);    border-color: rgba(30,76,153,.22); }
.rfb-badge--neutral  { background: #EDF1F7; color: var(--rfb-text-muted); border-color: var(--rfb-border); }

/* ============================================================
   Table
   ============================================================ */
.rfb-table-wrap {
  background: var(--rfb-surface-strong);
  border: 1px solid var(--rfb-border);
  border-radius: var(--rfb-r-lg);
  overflow: hidden;
  box-shadow: var(--rfb-shadow-md);
}
.rfb-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.rfb-table thead th {
  font-family: var(--rfb-font-body);
  font-weight: 600;
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  text-align: left;
  color: var(--rfb-text-muted);
  padding: 12px 16px;
  background: rgba(238, 243, 250, 0.6);
  border-bottom: 1px solid var(--rfb-border);
}
.rfb-table tbody td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--rfb-divider);
  color: var(--rfb-text);
  vertical-align: middle;
}
.rfb-table tbody tr:last-child td { border-bottom: none; }
.rfb-table tbody tr:hover td { background: rgba(238, 243, 250, 0.55); }
.rfb-table__id {
  font-family: var(--rfb-font-mono);
  font-size: 12px;
  color: var(--rfb-navy-700);
  font-weight: 500;
}

/* ============================================================
   Alert
   ============================================================ */
.rfb-alert {
  display: flex; gap: 12px;
  padding: 14px 16px;
  border-radius: var(--rfb-r-md);
  border-left: 4px solid;
  background: white;
  border: 1px solid var(--rfb-border);
  border-left-width: 4px;
}
.rfb-alert__icon {
  width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
}
.rfb-alert__title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.rfb-alert__msg { font-size: 13px; color: var(--rfb-text-muted); }
.rfb-alert--info    { border-left-color: var(--rfb-info);    background: var(--rfb-info-bg); }
.rfb-alert--success { border-left-color: var(--rfb-success); background: var(--rfb-success-bg); }
.rfb-alert--warning { border-left-color: var(--rfb-warning); background: var(--rfb-warning-bg); }
.rfb-alert--danger  { border-left-color: var(--rfb-danger);  background: var(--rfb-danger-bg); }

/* ============================================================
   KPI / Stat
   ============================================================ */
.rfb-kpi {
  background: var(--rfb-surface-strong);
  border: 1px solid var(--rfb-border);
  border-radius: var(--rfb-r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--rfb-shadow-sm);
}
.rfb-kpi::after {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--rfb-gold-500);
}
.rfb-kpi__label {
  font-size: 11px; font-weight: 600; letter-spacing: .8px;
  text-transform: uppercase; color: var(--rfb-text-muted);
}
.rfb-kpi__value {
  font-family: var(--rfb-font-display);
  font-weight: 700;
  font-size: 36px;
  color: var(--rfb-navy-900);
  line-height: 1;
  margin-top: 6px;
}
.rfb-kpi__delta { font-size: 12px; margin-top: 8px; display: inline-flex; gap: 4px; align-items: center; }
.rfb-kpi__delta--up   { color: var(--rfb-success); }
.rfb-kpi__delta--down { color: var(--rfb-danger); }
.rfb-kpi__icon {
  position: absolute; right: 16px; top: 16px;
  width: 32px; height: 32px;
  color: var(--rfb-navy-600);
  opacity: .25;
}

/* ============================================================
   Sidebar (opcional)
   ============================================================ */
.rfb-sidebar {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(10px);
  border-right: 1px solid var(--rfb-border);
  padding: 20px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.rfb-sidebar__group {
  font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--rfb-text-faint);
  padding: 14px 12px 6px;
}
.rfb-nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--rfb-r-md);
  font-size: 13px; color: var(--rfb-text);
  cursor: pointer; user-select: none;
  border-left: 3px solid transparent;
  margin-left: -3px;
}
.rfb-nav-item:hover { background: rgba(11,44,95,.05); }
.rfb-nav-item--active {
  background: var(--rfb-navy-800);
  color: white;
  font-weight: 600;
}
.rfb-nav-item--active:hover { background: var(--rfb-navy-900); }
.rfb-nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

/* ============================================================
   Tabs
   ============================================================ */
.rfb-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--rfb-border);
}
.rfb-tab {
  padding: 12px 18px;
  font-size: 13px; font-weight: 500;
  color: var(--rfb-text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .15s;
}
.rfb-tab:hover { color: var(--rfb-navy-800); }
.rfb-tab--active {
  color: var(--rfb-navy-900);
  font-weight: 600;
  border-bottom-color: var(--rfb-gold-500);
}

/* ============================================================
   Utilities
   ============================================================ */
.rfb-stack { display: flex; flex-direction: column; }
.rfb-row { display: flex; }
.rfb-grid { display: grid; }
.rfb-gap-1 { gap: 4px; } .rfb-gap-2 { gap: 8px; } .rfb-gap-3 { gap: 12px; }
.rfb-gap-4 { gap: 16px; } .rfb-gap-5 { gap: 20px; } .rfb-gap-6 { gap: 24px; }
.rfb-flex-1 { flex: 1; }
.rfb-divider { height: 1px; background: var(--rfb-divider); margin: 16px 0; }
.rfb-divider--gold {
  height: 2px; background: linear-gradient(90deg, var(--rfb-gold-500), transparent);
}

/* Footer bar (rodapé institucional) */
.rfb-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 32px;
  background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.85));
  border-top: 1px solid var(--rfb-border);
  font-size: 11px; color: var(--rfb-text-muted);
  letter-spacing: .3px;
}
.rfb-footer__brand {
  font-family: var(--rfb-font-display);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--rfb-navy-800);
}



/* ============================================================
   Wizard / etapas e opções de formulário
   ============================================================ */
.step-bar{display:flex;gap:0;padding:0 32px;background:rgba(255,255,255,.9);border-bottom:1px solid var(--rfb-border);overflow-x:auto;}
.step-item{display:flex;flex-direction:column;align-items:center;padding:10px 14px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--rfb-text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;gap:4px;min-width:72px;}
.step-item.done{color:var(--rfb-success);}
.step-item.active{color:var(--rfb-navy-800);border-bottom-color:var(--rfb-gold-500);}
.step-item.locked{color:var(--rfb-text-faint);cursor:not-allowed;}
.step-num{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:700;background:var(--rfb-navy-100);color:var(--rfb-navy-800);}
.step-item.done .step-num{background:var(--rfb-success-bg);color:var(--rfb-success);}
.step-item.active .step-num{background:var(--rfb-navy-800);color:white;}
.step-item.locked .step-num{background:#E5E8EE;color:var(--rfb-text-faint);}
.radio-option{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--rfb-border);border-radius:var(--rfb-r-md);cursor:pointer;transition:all .15s;background:white;margin-bottom:8px;}
.radio-option:hover{border-color:var(--rfb-navy-500);background:var(--rfb-navy-50);}
.radio-option.selected{border-color:var(--rfb-navy-800);background:var(--rfb-info-bg);}
.radio-option input[type=radio]{accent-color:var(--rfb-navy-800);margin-top:2px;flex-shrink:0;}
.check-option{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid var(--rfb-border);border-radius:var(--rfb-r-md);margin-bottom:8px;background:white;}
.check-option.checked{border-color:var(--rfb-navy-500);background:var(--rfb-info-bg);}

/* ============================================================
   Topbar (barra institucional fixa — padrão do hub; opcional)
   ============================================================ */
.rfb-topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 0 32px; height: 56px;
  background: rgba(3,14,36,.96);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.rfb-topbar__brand { display: flex; align-items: center; gap: 12px; }

.rfb-topbar__name {
  font-family: var(--rfb-font-display);
  font-size: 15px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; color: var(--rfb-text-on-navy);
}
.rfb-topbar__name span { opacity: .45; margin: 0 6px; font-weight: 400; }
.rfb-topbar__pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 12px; border-radius: 999px;
  background: rgba(201,163,92,.12); border: 1px solid rgba(201,163,92,.25);
  font-size: 10.5px; font-weight: 600; letter-spacing: .6px;
  text-transform: uppercase; color: var(--rfb-gold-400);
}
.rfb-topbar__pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--rfb-gold-500);
  box-shadow: 0 0 0 2.5px rgba(201,163,92,.30);

/* ============================================================
   Impressão e acessibilidade (padrão institucional)
   ============================================================ */
@media print {
  .no-print, .rfb-topbar, .rfb-user-pill { display: none !important; }

  .rfb-card { box-shadow: none !important; border: 1px solid #ccc; }
}
:focus-visible {
  outline: 2px solid var(--rfb-navy-600);

}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}


/* ==========================================================================
   VERITAS DIGITAL - COGER — estilos próprios da ferramenta
   ========================================================================== */
/* Layout base da ferramenta ------------------------------------------------ */
html, body { margin: 0; padding: 0; background: var(--rfb-bg); }
.vdc-main { max-width: 1120px; margin: 0 auto; padding: 28px 24px 64px; }

.vdc-epigraph {
  text-align: center;
  padding: 18px 12px 6px;
  font-family: var(--rfb-font-display);

  font-size: 15px;

}
.vdc-epigraph small { display: block; font-family: var(--rfb-font-body); font-style: normal; font-size: 11px; color: var(--rfb-text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }

.vdc-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.vdc-item-row { cursor: pointer; }

.vdc-status-icon--ok { background: var(--rfb-success-bg); color: var(--rfb-success); }

.vdc-timeline-event__meta { color: var(--rfb-text-muted); font-size: 11.5px; margin-top: 2px; }

/* Wizard steps content ----------------------------------------------------------*/

.vdc-provenance-option { }

/* ============================================================

function uid() { return crypto.randomUUID(); }
function nowIso() { return new Date().toISOString(); }
function fmtDT(iso) {
  if (!iso) return "—";
  var d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
}
function fmtBytes(n) {
  if (n === 0) return "0 B";
  if (!n) return "—";
  var u = ["B", "KB", "MB", "GB"], i = 0;
  while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(i === 0 ? 0 : 1) + " " + u[i];
}
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}
function get(obj, path) {
  return path.split(".").reduce(function (o, k) { return (o === null || o === undefined) ? undefined : o[k]; }, obj);
}
function set(obj, path, value) {
  var parts = path.split(".");
  var last = parts.pop();
  var target = parts.reduce(function (o, k) { if (!(k in o)) o[k] = {}; return o[k]; }, obj);
  target[last] = value;
}
function stableStringify(obj) {
  function sort(o) {
    if (Array.isArray(o)) return o.map(sort);
    if (o && typeof o === "object") {
      var out = {};
      Object.keys(o).sort().forEach(function (k) { out[k] = sort(o[k]); });
      return out;
    }
    return o;
  }
  return JSON.stringify(sort(obj));
}
function bufToHex(buf) {
  return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
}
async function sha256Hex(arrayBufferOrString) {
  var buf = typeof arrayBufferOrString === "string"
    ? new TextEncoder().encode(arrayBufferOrString)
    : arrayBufferOrString;
  var digest = await crypto.subtle.digest("SHA-256", buf);
  return bufToHex(digest);
}
async function hashFile(file) {
  var buf = await file.arrayBuffer();
  return sha256Hex(buf);
}
async function hashDossieMetadata(dossie) {
  var copy = JSON.parse(JSON.stringify(dossie));

/* ============================================================
   Toast
   ============================================================ */
function toast(msg, type) {
  var wrap = document.querySelector(".vdc-toast-wrap");
  if (!wrap) { wrap = document.createElement("div"); wrap.className = "vdc-toast-wrap"; document.body.appendChild(wrap); }
  var el = document.createElement("div");
  el.className = "vdc-toast" + (type ? " vdc-toast--" + type : "");
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(function () { el.remove(); }, 4200);
}

/* ============================================================
   Cálculo de agregados
   ============================================================ */
function piorResultado(resultados) {
  if (resultados.indexOf("diverge") !== -1) return "diverge";
  if (resultados.length === 0) return "nao_aplicavel";
  if (resultados.every(function (r) { return r === "confere"; })) return "confere";
  return "nao_aplicavel";
}
function recalcularAgregadoItem(item) {
  item.resultadoAgregado = piorResultado(item.arquivos.map(function (a) { return a.resultadoComparacao; }));
}
function statusIconClasse(item) {
  if (item.status === "descartado") return "vdc-status-icon--none";
  if (item.resultadoAgregado === "diverge") return "vdc-status-icon--warn";
  if (item.resultadoAgregado === "confere") return "vdc-status-icon--ok";
  return "vdc-status-icon--none";
}
function statusIconGlifo(item) {
  if (item.resultadoAgregado === "diverge") return "⚠";
  if (item.resultadoAgregado === "confere") return "✓";
  return "—";
}

   Eventos de linha do tempo (append-only)
   ============================================================ */
function novoEvento(tipo, dataOverrides) {
  var base = { evento: tipo, dataHora: nowIso(), responsavel: "", resultado: "", observacao: "" };
  return Object.assign(base, dataOverrides || {});
}
function registrarEventoItem(item, tipo, overrides) {
  item.linhaDoTempoItem.push(novoEvento(tipo, overrides));
}
function registrarEventoArquivo(arquivo, tipo, overrides) {
  arquivo.linhaDoTempoArquivo.push(novoEvento(tipo, overrides));
}

function eventosMesclados(item) {
  var evs = item.linhaDoTempoItem.map(function (e) { return Object.assign({}, e, { escopo: "item" }); });

    (a.linhaDoTempoArquivo || []).forEach(function (e) { evs.push(Object.assign({}, e, { escopo: "arquivo", arquivoNome: a.descricao || a.nomeArquivo })); });
  });
  evs.sort(function (x, y) { return new Date(x.dataHora) - new Date(y.dataHora); });
  return evs;
}

}

/* ============================================================
   API pública — App
   ============================================================ */
window.App = {
  render: render,

  criarDossie: function () {
    DB.dossie = novoDossie();
    UI.view = "processo";
    persistir().then(render);
  },
  importarArquivo: function (evt) {
    var file = evt.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = async function () {
      var parsed;
      try { parsed = JSON.parse(reader.result); } catch (e) { toast("Arquivo .json inválido.", "danger"); return; }
      if (parsed.versaoEsquema !== "2.0") { toast("Versão de esquema não suportada: " + parsed.versaoEsquema, "danger"); return; }
      var hashCalc = await hashDossieMetadata(parsed);
      var hashDivergente = parsed.hashDoDossie && hashCalc !== parsed.hashDoDossie;
      if (DB.dossie && DB.dossie.itens.length > 0) {
        UI.modal = { tipo: "importarChoice", parsed: parsed, hashDivergente: hashDivergente };
        render();
      } else {
        App._finalizarImportacao(parsed, hashDivergente);
      }
    };
    reader.readAsText(file);
    evt.target.value = "";
  },
  confirmarImportacao: function () {
    var m = UI.modal;
    App._finalizarImportacao(m.parsed, m.hashDivergente);
  },
  _finalizarImportacao: function (parsed, hashDivergente) {
    DB.dossie = parsed;
    UI.modal = null;
    UI.view = "processo";
    persistir().then(function () {
      render();
      toast(hashDivergente ? "Dossiê importado — hashDoDossie divergente, verifique a origem do arquivo." : "Dossiê importado com sucesso.", hashDivergente ? "danger" : "success");
    });
  },
  exportarDossie: function () {
    persistir().then(function () {
      var blob = new Blob([JSON.stringify(DB.dossie, null, 2)], { type: "application/json" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "dossie-" + (DB.dossie.processo.numero || "veritas-digital-coger").replace(/[^\w.-]+/g, "_") + ".json";
      document.body.appendChild(a); a.click(); a.remove();
      toast("Dossiê exportado.", "success");
    });
  },

  setProcesso: function (path, value) { set(DB.dossie.processo, path, value); persistir().then(updateTopbar); },
  setVogais: function (value) { DB.dossie.processo.comissao.vogais = value.split("\n").map(function (s) { return s.trim(); }).filter(Boolean); persistir(); },

  voltarProcesso: function () { UI.view = "processo"; UI.editingField = null; render(); },
  abrirItem: function (id) { UI.view = "itemDetalhe"; UI.editingField = id; render(); },
  irParaConferencia: function () { UI.view = "conferencia"; render(); },
  irParaRelatorio: function () { UI.view = "relatorio"; render(); },

  criarItem: function () { UI.draftItem = novoItemDraft(); UI.wizardStep = 1; UI.view = "itemWizard"; render(); },
  cancelarWizard: function () { UI.draftItem = null; UI.view = "processo"; render(); },
  setDraft: function (path, value) { set(UI.draftItem, path, value); render(); },
  irParaStep: function (n) { if (n < UI.wizardStep || App._validarStep(UI.wizardStep)) { UI.wizardStep = n; render(); } },
  avancarStep: function () { if (App._validarStep(UI.wizardStep)) { UI.wizardStep++; render(); } },
  _validarStep: function (step) {
    var d = UI.draftItem;
    if (step === 1) {
      if (!d.titulo.trim()) { toast("Informe o título/descrição.", "danger"); return false; }
      if (!d.categoria) { toast("Selecione a categoria.", "danger"); return false; }
      if (!d.conteudoIntegral && !d.justificativaExtrato.trim()) { toast("Justificativa obrigatória para extrato parcial.", "danger"); return false; }
    }
    if (step === 2) {
      if (!d.proveniencia.tipo) { toast("Selecione o tipo de proveniência.", "danger"); return false; }
    }
    if (step === 3) {
      if (d.arquivos.length === 0) { toast("Adicione ao menos um arquivo.", "danger"); return false; }
    }
    return true;
  },

  adicionarArquivoDraft: async function () {
    var input = document.getElementById("novoArquivoInput");
    var file = input.files[0];
    if (!file) { toast("Selecione um arquivo.", "danger"); return; }
    var descricao = document.getElementById("novoArquivoDescricao").value;
    var hashDeclaradoEl = document.getElementById("novoArquivoHashDeclarado");
    var hashDeclarado = hashDeclaradoEl ? hashDeclaradoEl.value.trim() : "";
    var arquivo = await App._construirArquivo(file, descricao, hashDeclarado, UI.draftItem.proveniencia);
    UI.draftItem.arquivos.push(arquivo);
    render();
    toast("Arquivo adicionado.", "success");
  },
  adicionarArquivoExistente: async function (itemId) {
    var it = findItem(itemId);
    var input = document.getElementById("detArquivoInput");
    var file = input.files[0];
    if (!file) { toast("Selecione um arquivo.", "danger"); return; }
    var descricao = document.getElementById("detArquivoDescricao").value;
    var hashDeclaradoEl = document.getElementById("detArquivoHashDeclarado");
    var hashDeclarado = hashDeclaradoEl ? hashDeclaradoEl.value.trim() : "";
    var arquivo = await App._construirArquivo(file, descricao, hashDeclarado, it.proveniencia);
    it.arquivos.push(arquivo);
    registrarEventoItem(it, "descricao_registrada", { responsavel: it.responsavelRegistro, observacao: "Arquivo adicionado ao pacote: " + (descricao || file.name) });
    recalcularAgregadoItem(it);
    persistir().then(render);
    toast("Arquivo adicionado ao item.", "success");
  },
  _construirArquivo: async function (file, descricao, hashDeclarado, proveniencia) {
    var hashLocal = await hashFile(file);
    var isB = proveniencia.tipo === "recebido_hash_oficial";
    var porArquivo = isB && proveniencia.modoHashDeclarado === "por_arquivo";
    var resultado = "nao_aplicavel";
    if (porArquivo && hashDeclarado) resultado = (hashLocal.toLowerCase() === hashDeclarado.toLowerCase()) ? "confere" : "diverge";
    var arquivo = {
      id: uid(), descricao: descricao || "", nomeArquivo: file.name, tamanho: file.size, tipoMime: file.type || "aplicação/octeto",
      hashLocal: hashLocal, algoritmoLocal: "SHA-256", hashDeclarado: porArquivo ? hashDeclarado : "",
      resultadoComparacao: resultado, carimboLocal: nowIso(), linhaDoTempoArquivo: []
    };
    registrarEventoArquivo(arquivo, "arquivo_adicionado", { responsavel: "", observacao: descricao || file.name });
    registrarEventoArquivo(arquivo, "hash_local_calculado", { resultado: resultado === "nao_aplicavel" ? "" : resultado });
    if (porArquivo && hashDeclarado) registrarEventoArquivo(arquivo, "hash_declarado_recebido", { resultado: resultado });
    return arquivo;
  },

  salvarItem: function () {
    if (!App._validarStep(1) || !App._validarStep(2) || !App._validarStep(3)) return;
    var d = UI.draftItem;
    registrarEventoItem(d, "item_identificado", { responsavel: d.responsavelRegistro, observacao: d.titulo });
    recalcularAgregadoItem(d);
    DB.dossie.itens.push(d);
    UI.draftItem = null;
    UI.view = "itemDetalhe";
    UI.editingField = d.id;
    persistir().then(render);
    toast("Item salvo.", "success");
  },

  salvarCampoItem: function (field, value) {
    var it = findItem(UI.editingField);
    if (field === "categoria" && value === "" ) return;
    set(it, field, value);
    persistir().then(render);
  },

  abrirModal: function (tipo, payload) {

    if (tipo === "evento") UI.modal.campos = { tipo: "transferencia_custodia", novoStatus: "ativo", escopo: "item" };

  },
  fecharModal: function () { UI.modal = null; render(); },
  _refrescarExtraFields: function () {

  },
  mudarTipoEvento: function (v) { UI.modal.campos.tipo = v; App._refrescarExtraFields(); },
  mudarNovoStatusEvento: function (v) { UI.modal.campos.novoStatus = v; App._refrescarExtraFields(); },
  mudarEscopoEvento: function (v) { UI.modal.campos.escopo = v; App._refrescarExtraFields(); },
  confirmarEvento: function () {

    var observacao = document.getElementById("evObservacao").value;

      var novo = document.getElementById("evNovoCustodiante").value;
      if (!novo.trim()) { toast("Informe o novo custodiante.", "danger"); return; }
      it.custodianteAtual = novo;
      registrarEventoItem(it, "transferencia_custodia", { responsavel: responsavel, observacao: observacao || ("Novo custodiante: " + novo) });
    } else if (tipo === "enviado_pericia") {
      var arqId = document.getElementById("evArquivo").value;
      var arq = it.arquivos.find(function (a) { return a.id === arqId; });
      registrarEventoArquivo(arq, "enviado_pericia", { responsavel: responsavel, observacao: observacao });
    } else if (tipo === "status_alterado") {
      var novoStatus = document.getElementById("evNovoStatus").value;

        var fund = document.getElementById("evFundamentacao").value;
        if (!fund.trim()) { toast("Fundamentação da contestação é obrigatória.", "danger"); return; }

      }

      it.status = novoStatus;
      registrarEventoItem(it, "status_alterado", { responsavel: responsavel, resultado: novoStatus, observacao: observacao });

      var just = document.getElementById("evJustificativa").value;

    } else if (tipo === "descricao_registrada") {
      var escopo = document.getElementById("evEscopo").value;
      var texto = document.getElementById("evTexto").value;
      if (escopo === "arquivo") {
        var arqId2 = document.getElementById("evArquivo").value;

        registrarEventoArquivo(arq2, "descricao_registrada", { responsavel: responsavel, observacao: texto || observacao });
      } else {
        registrarEventoItem(it, "descricao_registrada", { responsavel: responsavel, observacao: texto || observacao });
      }
    }
    UI.modal = null;
    persistir().then(render);
    toast("Evento registrado.", "success");
  },

  conferirArquivo: async function (itemId, arquivoId) {
    var it = findItem(itemId);
    var a = it.arquivos.find(function (x) { return x.id === arquivoId; });
    var input = document.getElementById("conf_" + arquivoId);
    var file = input.files[0];
    if (!file) { toast("Selecione um arquivo para conferir.", "danger"); return; }
    var hashRecalculado = await hashFile(file);
    var referencia = referenciaHash(it, a);
    var resultado = referencia && referencia !== "—" ? (hashRecalculado.toLowerCase() === referencia.toLowerCase() ? "confere" : "diverge") : "nao_aplicavel";
    a.resultadoComparacao = resultado;
    registrarEventoArquivo(a, "conferencia_arquivo", { responsavel: "", resultado: resultado, observacao: resultado === "diverge" ? "Divergência encontrada na conferência — ver princípio do prejuízo." : "" });
    persistir().then(render);
    if (resultado === "diverge") { toast("Divergência encontrada em " + (a.descricao || a.nomeArquivo), "danger"); }
    else toast("Arquivo conferido: " + RESULTADO[resultado], "success");
  },
  concluirConferenciaItem: function (itemId) {
    var it = findItem(itemId);
    recalcularAgregadoItem(it);
    registrarEventoItem(it, "conferencia_rodada", { resultado: it.resultadoAgregado });
    persistir().then(render);
    var msg = it.resultadoAgregado === "diverge" ? "Conferência concluída com divergência — " + it.titulo : "Conferência concluída.";
    toast(msg, it.resultadoAgregado === "diverge" ? "danger" : "success");
    if (it.resultadoAgregado === "diverge") {
      setTimeout(function () {
        var wrap = document.querySelector(".vdc-toast-wrap");
        var el = document.createElement("div");
        el.className = "vdc-toast";
        el.innerHTML = CATALOGO.dicas.dica_prejuizo;
        wrap.appendChild(el);
        setTimeout(function () { el.remove(); }, 7000);
      }, 300);
    }
  }
};

document.addEventListener("DOMContentLoaded", function () {
  var saved = carregarLocal();
  if (saved) { DB.dossie = saved; UI.view = "processo"; }
  render();
});

})();

</script>
