<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Painel de Estudos</title>
<style>
  :root {
    --fisica:    #6366f1;
    --biologia:  #22c55e;
    --quimica:   #a855f7;
    --matematica:#f97316;
    --historia:  #d97706;
    --geografia: #14b8a6;
    --portugues: #ef4444;
    --redacao:   #ec4899;
    --done:      #22c55e;

    --bg:       #0f0f14;
    --surface:  #1a1a24;
    --surface2: #22222f;
    --border:   #2e2e3f;
    --text:     #f1f1f5;
    --muted:    #8888aa;
    --radius:   16px;
    --rsm:      10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100dvh;overflow-x:hidden}

  /* ─ ONBOARDING ─ */
  #onboarding{min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:2rem;text-align:center;
    background:linear-gradient(135deg,#0f0f14 0%,#1a0f2e 100%)}
  .ob-logo{font-size:3.5rem;margin-bottom:1rem}
  .ob-h1{font-size:2rem;font-weight:900;margin-bottom:.4rem}
  .ob-sub{color:var(--muted);font-size:1rem;margin-bottom:2.5rem}
  .prof-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  .prof-btn{border:none;cursor:pointer;border-radius:var(--radius);padding:1.6rem 2.8rem;
    font-size:1.25rem;font-weight:800;transition:transform .15s,box-shadow .15s;min-width:150px}
  .prof-btn:hover{transform:translateY(-4px);box-shadow:0 16px 36px rgba(0,0,0,.45)}
  .prof-btn.malu{background:linear-gradient(135deg,#ec4899,#a855f7);color:#fff}
  .prof-btn.bruno{background:linear-gradient(135deg,#6366f1,#14b8a6);color:#fff}

  /* ─ APP SHELL ─ */
  #app{display:none;flex-direction:column;min-height:100dvh}

  /* ─ TOPBAR ─ */
  .topbar{position:sticky;top:0;z-index:100;background:var(--surface);
    border-bottom:1px solid var(--border);padding:.9rem 1.1rem;
    display:flex;align-items:center;gap:.75rem}
  .back-btn{background:var(--surface2);border:none;border-radius:50%;width:36px;height:36px;
    cursor:pointer;color:var(--text);font-size:1.2rem;display:flex;align-items:center;
    justify-content:center;flex-shrink:0;display:none}
  .topbar-title{font-size:1.05rem;font-weight:700;flex:1}
  .profile-chip{font-size:.72rem;font-weight:700;padding:.28rem .7rem;border-radius:99px;
    background:var(--surface2);color:var(--muted);cursor:pointer;flex-shrink:0;border:none}
  .color-bar{height:3px;position:absolute;top:0;left:0;right:0}

  /* ─ PAGES ─ */
  .page{display:none;flex:1;overflow-y:auto;padding:1rem 1rem 5.5rem}
  .page.active{display:block}

  /* ─ BOTTOM NAV ─ */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);
    border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;border:none;background:none;cursor:pointer;padding:.75rem .5rem;
    display:flex;flex-direction:column;align-items:center;gap:.2rem;color:var(--muted);
    font-size:.68rem;font-weight:700;transition:color .15s;letter-spacing:.01em}
  .nav-btn .ni{font-size:1.35rem}
  .nav-btn.active{color:#6366f1}

  /* ─ PAINEL GRID ─ */
  .cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem}
  @media(min-width:560px){.cards-grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:820px){.cards-grid{grid-template-columns:repeat(4,1fr)}}

  .subj-card{border-radius:var(--radius);padding:1.15rem 1.1rem;cursor:pointer;
    transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden;
    border:1px solid var(--border);background:var(--surface);min-height:135px;
    display:flex;flex-direction:column}
  .subj-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.35)}
  .subj-card .sc-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius) var(--radius) 0 0}
  .subj-card .sc-icon{font-size:1.85rem;margin-bottom:.45rem}
  .subj-card .sc-name{font-size:.95rem;font-weight:800;margin-bottom:auto}
  .subj-card .sc-stats{margin-top:.75rem;display:flex;flex-wrap:wrap;gap:.3rem}
  .stat-pill{font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:99px;
    background:rgba(255,255,255,.07)}
  .badge-alert{position:absolute;top:.65rem;right:.65rem;background:#ef4444;color:#fff;
    font-size:.58rem;font-weight:800;border-radius:99px;padding:.18rem .45rem}

  /* ─ PROGRESS RING ─ */
  .ring-wrap{position:absolute;bottom:.8rem;right:.8rem}
  .ring-wrap svg{width:38px;height:38px;transform:rotate(-90deg)}
  .ring-wrap .ring-bg{fill:none;stroke:var(--surface2);stroke-width:3}
  .ring-wrap .ring-fill{fill:none;stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .4s}
  .ring-wrap .ring-text{font-size:.55rem;font-weight:800;text-anchor:middle;dominant-baseline:middle;
    fill:var(--text);transform:rotate(90deg);transform-origin:50% 50%}

  /* ─ SECTION TITLE ─ */
  .sec-title{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;
    letter-spacing:.07em;margin:1.2rem 0 .65rem}

  /* ─ CATALOG / CHECKBOX LIST ─ */
  .catalog-section{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);overflow:hidden;margin-bottom:1rem}
  .catalog-toggle{display:flex;align-items:center;gap:.7rem;padding:.9rem 1.1rem;
    cursor:pointer;user-select:none}
  .catalog-toggle .ct-icon{font-size:1.1rem}
  .catalog-toggle .ct-label{font-size:.88rem;font-weight:700;flex:1}
  .catalog-toggle .ct-arrow{color:var(--muted);transition:transform .2s}
  .catalog-toggle .ct-arrow.open{transform:rotate(180deg)}
  .catalog-body{border-top:1px solid var(--border);padding:.6rem .4rem;display:none}
  .catalog-body.open{display:block}
  .cat-item{display:flex;align-items:center;gap:.75rem;padding:.55rem .7rem;
    border-radius:var(--rsm);cursor:pointer;transition:background .12s}
  .cat-item:hover{background:var(--surface2)}
  .cat-cb{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);
    background:var(--surface2);display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s,border-color .15s;font-size:.75rem}
  .cat-cb.checked{background:#6366f1;border-color:#6366f1}
  .cat-label{font-size:.85rem}

  /* ─ TOPIC CARDS ─ */
  .topic-card{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:1rem 1.1rem;margin-bottom:.6rem;
    cursor:pointer;transition:transform .12s;display:flex;align-items:center;gap:.85rem}
  .topic-card:hover{transform:translateX(3px)}
  .topic-card.done{border-color:var(--done)22}
  .tc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .tc-info{flex:1;min-width:0}
  .tc-name{font-size:.9rem;font-weight:700}
  .tc-name.done-text{color:var(--done)}
  .tc-sub{font-size:.73rem;color:var(--muted);margin-top:.2rem}
  .tc-arr{color:var(--muted);font-size:1.1rem}

  /* ─ APOSTILA BLOCKS ─ */
  .apostila-block{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);margin-bottom:.85rem;overflow:hidden}
  .apostila-block.done-block{border-color:var(--done)44}
  .ap-head{padding:.95rem 1.1rem;display:flex;align-items:center;gap:.75rem;
    cursor:pointer;user-select:none}
  .ap-icon{font-size:1.4rem}
  .ap-info{flex:1}
  .ap-type{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .ap-name{font-size:.88rem;font-weight:600}
  .ap-metric{text-align:right;flex-shrink:0}
  .ap-pct{font-size:1.35rem;font-weight:900}
  .ap-pct-lbl{font-size:.6rem;color:var(--muted)}
  .ap-done-badge{font-size:.65rem;font-weight:700;padding:.18rem .5rem;border-radius:99px;
    background:var(--done)22;color:var(--done);margin-left:.5rem}
  .ap-arr{color:var(--muted);transition:transform .2s;flex-shrink:0}
  .ap-arr.open{transform:rotate(180deg)}
  .ap-body{border-top:1px solid var(--border);padding:1rem 1.1rem;display:none}
  .ap-body.open{display:block}
  .ap-name-row{margin-bottom:.85rem}
  .ap-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--rsm);padding:.5rem .75rem;color:var(--text);font-size:.85rem}
  .ap-name-input:focus{outline:none;border-color:#6366f1}

  .session-list{margin-bottom:.75rem}
  .sess-item{background:var(--surface2);border-radius:var(--rsm);padding:.6rem .85rem;
    margin-bottom:.35rem;font-size:.8rem;display:flex;gap:.5rem;align-items:flex-start;position:relative}
  .sess-date{color:var(--muted);flex-shrink:0;min-width:60px}
  .sess-info{flex:1}
  .sess-del{position:absolute;top:.35rem;right:.4rem;background:none;border:none;
    color:var(--muted);cursor:pointer;font-size:.75rem;opacity:0;transition:opacity .15s}
  .sess-item:hover .sess-del{opacity:1}

  .conclude-row{display:flex;gap:.6rem;margin-top:.85rem;padding-top:.85rem;border-top:1px solid var(--border)}
  .btn-conclude{flex:1;border:2px solid var(--done);background:transparent;color:var(--done);
    border-radius:var(--rsm);padding:.65rem;cursor:pointer;font-size:.82rem;font-weight:700;
    transition:background .15s,color .15s}
  .btn-conclude:hover,.btn-conclude.concluded{background:var(--done);color:#fff}
  .btn-conclude.concluded{border-color:var(--done)}
  .btn-reg{flex:1;background:var(--surface2);border:1px solid var(--border);
    color:var(--text);border-radius:var(--rsm);padding:.65rem;cursor:pointer;
    font-size:.82rem;font-weight:600;transition:background .15s}
  .btn-reg:hover{background:#2a2a3e}

  /* ─ REDAÇÃO ─ */
  .red-stats{display:flex;gap:1.5rem;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:1.2rem;margin-bottom:1rem}
  .red-stat .rs-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.05em;color:var(--muted);margin-bottom:.2rem}
  .red-stat .rs-val{font-size:2.2rem;font-weight:900;line-height:1}
  .red-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:1rem 1.1rem;margin-bottom:.6rem;position:relative}
  .rc-nota{position:absolute;top:1rem;right:1.1rem;font-size:1.7rem;font-weight:900}
  .rc-tema{font-size:.9rem;font-weight:700;margin-bottom:.3rem;padding-right:3rem}
  .rc-date{font-size:.74rem;color:var(--muted)}
  .rc-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.74rem;margin-top:.5rem}

  /* ─ WEEK PAGE ─ */
  .week-hero{background:linear-gradient(135deg,#1a1030,var(--surface));
    border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
  .week-hero h2{font-size:1.35rem;font-weight:900;margin-bottom:.25rem}
  .week-hero .wh-sub{color:var(--muted);font-size:.83rem;margin-bottom:1rem}
  .big-num{font-size:3.5rem;font-weight:900;line-height:1}
  .big-num span{font-size:.95rem;font-weight:400;color:var(--muted)}

  .stats2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem}
  .stat-card .sc-lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;margin-bottom:.35rem}
  .stat-card .sc-val{font-size:1.9rem;font-weight:900}
  .stat-card .sc-delta{font-size:.73rem;margin-top:.25rem}
  .delta-up{color:#22c55e}.delta-dn{color:#ef4444}.delta-ne{color:var(--muted)}

  .review-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid #ef4444;
    border-radius:var(--rsm);padding:.9rem 1rem;margin-bottom:.5rem}
  .ri-title{font-size:.88rem;font-weight:700;margin-bottom:.18rem}
  .ri-reason{font-size:.76rem;color:var(--muted)}

  .bysub-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);
    padding:.8rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.45rem}
  .bysub-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .bysub-name{flex:1;font-size:.88rem;font-weight:600}
  .bysub-count{font-size:.83rem;color:var(--muted)}

  /* ─ MODAL ─ */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;
    display:flex;align-items:flex-end;justify-content:center}
  .modal-ov.hidden{display:none}
  .modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
    padding:1.5rem;width:100%;max-width:520px;max-height:88dvh;overflow-y:auto}
  .modal h3{font-size:1.05rem;font-weight:800;margin-bottom:1.1rem}
  .form-group{margin-bottom:.9rem}
  .form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:.35rem}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--rsm);padding:.6rem .85rem;color:var(--text);font-size:.95rem}
  .form-input:focus{outline:none;border-color:#6366f1}
  textarea.form-input{resize:vertical;min-height:80px}
  .form-row{display:flex;gap:.75rem}
  .form-row .form-group{flex:1}
  .modal-acts{display:flex;gap:.6rem;margin-top:1.3rem}
  .btn-pri{flex:1;background:#6366f1;color:#fff;border:none;border-radius:var(--rsm);
    padding:.8rem;cursor:pointer;font-size:.93rem;font-weight:700;transition:background .15s}
  .btn-pri:hover{background:#4f52d9}
  .btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border);
    border-radius:var(--rsm);padding:.8rem 1.1rem;cursor:pointer;font-size:.93rem;font-weight:600}

  /* ─ MISC ─ */
  .add-btn{width:100%;border:2px dashed var(--border);background:none;color:var(--muted);
    border-radius:var(--radius);padding:.95rem;cursor:pointer;font-size:.88rem;font-weight:700;
    transition:border-color .15s,color .15s;margin-top:.5rem}
  .add-btn:hover{border-color:#6366f1;color:#6366f1}
  .empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty .ei{font-size:2.8rem;margin-bottom:.75rem}
  .toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#22c55e;
    color:#fff;border-radius:99px;padding:.55rem 1.35rem;font-size:.83rem;font-weight:700;
    z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .ctx-menu{position:fixed;background:var(--surface2);border:1px solid var(--border);
    border-radius:var(--rsm);padding:.3rem 0;z-index:300;min-width:145px;
    box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .ctx-menu.hidden{display:none}
  .ctx-item{padding:.6rem 1rem;font-size:.86rem;cursor:pointer;transition:background .1s}
  .ctx-item:hover{background:var(--border)}
  .ctx-item.danger{color:#ef4444}
  .pct-g{color:#22c55e}.pct-m{color:#f97316}.pct-b{color:#ef4444}.pct-na{color:var(--muted)}
  .prof-bar{padding:.35rem 1.1rem .5rem;font-size:.76rem;font-weight:600;color:var(--muted);
    background:var(--surface);border-bottom:1px solid var(--border)}
  .prof-bar strong{color:var(--text)}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding" style="display:none">
  <div class="ob-logo">📚</div>
  <h1 class="ob-h1">Painel de Estudos</h1>
  <p class="ob-sub">Este painel é de quem?</p>
  <div class="prof-btns">
    <button class="prof-btn malu" onclick="chooseProfile('malu')">🌸 Malu</button>
    <button class="prof-btn bruno" onclick="chooseProfile('bruno')">🚀 Bruno</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar" id="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <span class="topbar-title" id="topbarTitle">Painel</span>
    <button class="profile-chip" id="profileChip" onclick="openSettings()"></button>
  </div>
  <div class="prof-bar" id="profBar"></div>

  <div class="page active" id="page-painel"><div id="painelContent"></div></div>
  <div class="page" id="page-materia"><div id="materiaContent"></div></div>
  <div class="page" id="page-assunto"><div id="assuntoContent"></div></div>
  <div class="page" id="page-semana"><div id="semanaContent"></div></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-painel" onclick="showMainPage('painel')">
      <span class="ni">🏠</span>Painel
    </button>
    <button class="nav-btn" id="nav-semana" onclick="showMainPage('semana')">
      <span class="ni">📅</span>Minha Semana
    </button>
  </nav>
</div>

<div class="modal-ov hidden" id="modalOv" onclick="closeModalOv(event)">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <div class="modal-acts" id="modalActs"></div>
  </div>
</div>
<div class="ctx-menu hidden" id="ctxMenu"></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// CATALOG — fixed per edital EBMSP 2026.2
// ══════════════════════════════════════════════════════
const CATALOG = {
  fisica: [
    'Grandezas, Notação Científica e Vetores','Cinemática','Dinâmica e Leis de Newton',
    'Atrito, Peso, Normal e Tração','Movimento Circular e Força Centrípeta','Hidrostática',
    'Trabalho, Energia e Potência','Conservação de Energia Mecânica',
    'Gravitação Universal e Leis de Kepler','Eletrostática','Eletrodinâmica e Circuitos',
    'Magnetismo','Ondulatória','Óptica Geométrica','Termometria e Escalas Térmicas',
    'Calorimetria e Mudanças de Estado','Termodinâmica e Gases Ideais',
  ],
  quimica: [
    'Modelos Atômicos','Tabela Periódica','Ligações Químicas',
    'Funções Inorgânicas (ácidos, bases, sais, óxidos)','Soluções e Concentração',
    'Estequiometria','Termoquímica','Eletroquímica','Cinética Química',
    'Equilíbrio Químico e pH','Radioatividade','Química Orgânica — Funções',
    'Polímeros e Macromoléculas','Química Ambiental e Industrial','Energias e Combustíveis',
  ],
  biologia: [
    'Citologia','Metabolismo Energético (fotossíntese e respiração)','Genética Mendeliana',
    'Biotecnologia','Evolução','Origem da Vida','Sistemática e Classificação dos Seres Vivos',
    'Ecologia','Ciclos Biogeoquímicos','Biomas e Problemas Ambientais',
    'Doenças e Saúde Pública','Embriologia e Fisiologia Humana','Imunologia e Grupos Sanguíneos',
  ],
  matematica: [
    'Conjuntos Numéricos','Razão, Proporção e Porcentagem','Progressões (PA e PG)',
    'Princípios de Contagem','Geometria Plana','Geometria Espacial','Trigonometria',
    'Funções do 1º e 2º Graus','Funções Exponenciais e Logarítmicas',
    'Equações e Inequações','Estatística','Probabilidade','Geometria Analítica',
  ],
  historia: [
    'Cultura e Patrimônio (povos indígenas e africanos)','Colonização e Conflitos na América',
    'Cidadania e Democracia','Revoluções Políticas e Sociais',
    'Formação Territorial e Política do Brasil','Movimentos Revolucionários do Séc. XX',
    'Guerras Mundiais e Guerra Fria','Totalitarismos e Ditaduras na América Latina',
    'Direitos Civis, Sociais e Políticos',
    'Estruturas Produtivas (escravismo, feudalismo, capitalismo)',
    'Economia Brasileira (açúcar, café, mineração, borracha)',
    'Revolução Industrial e Industrialização Brasileira','Globalização e Novas Tecnologias',
  ],
  geografia: [
    'Relação Homem-Natureza e Recursos Naturais','Impactos Ambientais e Mudanças Climáticas',
    'Recursos Hídricos e Bacias Hidrográficas','Relevo e Solo','Climatologia',
    'Biomas e Vegetação','Cartografia','Urbanização e Espaço Urbano',
    'Fluxos Populacionais e Migrações','Geopolítica','Agronegócio e Estruturas Agrárias',
  ],
  portugues: [
    'Gêneros Textuais','Texto Argumentativo','Coesão e Coerência Textual',
    'Norma Culta e Variação Linguística','Funções da Linguagem',
    'Literatura Brasileira — Movimentos','Análise Literária (épico, lírico, dramático)',
    'Gêneros Digitais','Figuras de Linguagem e Recursos Expressivos',
  ],
};

const SUBJECTS = [
  {id:'fisica',    name:'Física',     icon:'⚡', color:'var(--fisica)'},
  {id:'biologia',  name:'Biologia',   icon:'🌿', color:'var(--biologia)'},
  {id:'quimica',   name:'Química',    icon:'🧪', color:'var(--quimica)'},

let D = {};
let curSubj = null, curTopic = null;
let navStack = [];

function makeApostilas(){
  return {
    multipla:  {nomeApostila:'',concluido:false,sessoes:[]},
    vf:        {nomeApostila:'',concluido:false,sessoes:[]},
    discursiva:{nomeApostila:'',concluido:false,sessoes:[]},
  };
}

function topicKey(name){
  return name.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'').substring(0,40);
}

function load(){
  const raw = localStorage.getItem('painelV2');
  if(raw){D=JSON.parse(raw);return}
  D={perfil:null,materias:{},redacao:{sessoes:[]}};
  SUBJECTS.forEach(s=>{
    if(s.id!=='redacao') D.materias[s.id]={assuntosSelecionados:[],assuntos:{}};
  });
}
function save(){localStorage.setItem('painelV2',JSON.stringify(D))}

function getM(sid){return D.materias[sid]}
function getTopic(sid,tid){return getM(sid).assuntos[tid]}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}
function showMainPage(tab){
  navStack=[];
  document.getElementById('backBtn').style.display='none';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  if(tab==='painel'){setTitle('Painel');renderPainel();showPage('painel')}
  else{setTitle('Minha Semana');renderSemana();showPage('semana')}
}
function pushNav(state){
  navStack.push(state);
  document.getElementById('backBtn').style.display='flex';
}
function goBack(){
  navStack.pop();
  if(!navStack.length){showMainPage('painel');return}
  const prev=navStack[navStack.length-1];
  if(prev.page==='materia'){
    curSubj=prev.sid;
    setTitle(SUBJECTS.find(s=>s.id===prev.sid).name);
    if(prev.sid==='redacao'){renderRedacao();showPage('materia')}
    else{renderMateria(prev.sid);showPage('materia')}
  }else if(prev.page==='assunto'){
    curSubj=prev.sid;curTopic=prev.tid;
    setTitle(getTopic(prev.sid,prev.tid).nome);
    renderAssunto(prev.sid,prev.tid);showPage('assunto');
  }
}
function setTitle(t){document.getElementById('topbarTitle').textContent=t}

function openSubj(sid){
  curSubj=sid;
  const s=SUBJECTS.find(x=>x.id===sid);
  setTitle(s.name);
  if(sid==='redacao'){renderRedacao();showPage('materia')}
  else{renderMateria(sid);showPage('materia')}

}
function openTopic(sid,tid){

}

// ══════════════════════════════════════════════════════
// METRICS
// ══════════════════════════════════════════════════════
function avgPct(sessions){
  if(!sessions||!sessions.length)return null;
  const scored=sessions.filter(s=>s.total>0);
  if(!scored.length)return null;
  return Math.round(scored.reduce((a,s)=>a+(s.acertos/s.total)*100,0)/scored.length);
}
function topicDone(topic){
  return AP_TYPES.every(at=>topic.apostilas[at.id].concluido);
}
function topicOverallPct(topic){
  const avgs=AP_TYPES.filter(a=>a.hasScore).map(at=>avgPct(topic.apostilas[at.id].sessoes));
  const valid=avgs.filter(x=>x!==null);
  return valid.length?Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):null;
}
function daysDiff(d1,d2){return Math.floor((d2-d1)/(86400000))}
function lastSessionDate(sid,tid){
  const t=getTopic(sid,tid);
  let last=null;
  AP_TYPES.forEach(at=>{
    (t.apostilas[at.id].sessoes||[]).forEach(s=>{
      const d=new Date(s.data);
      if(!last||d>last)last=d;
    });
  });
  return last;
}
function topicReviewReasons(sid,tid){
  const reasons=[];
  const now=new Date();
  const last=lastSessionDate(sid,tid);
  if(!last||daysDiff(last,now)>14) reasons.push('sem sessão há mais de 14 dias');
  AP_TYPES.filter(a=>a.hasScore).forEach(at=>{
    const p=avgPct(getTopic(sid,tid).apostilas[at.id].sessoes);
    if(p!==null&&p<60) reasons.push(`${at.name}: ${p}% de acerto`);
  });
  return reasons;
}
function redacaoReviewReasons(){
  const sess=D.redacao.sessoes;
  const now=new Date();
  const reasons=[];
  if(!sess.length||daysDiff(new Date(sess[0].data),now)>14)
    reasons.push('sem redação há mais de 14 dias');
  const l3=sess.slice(0,3);
  if(l3.length>=1){
    const avg=l3.reduce((a,s)=>a+s.nota,0)/l3.length;
    if(avg<6)reasons.push(`média das últimas ${l3.length}: ${avg.toFixed(1)}`);
  }
  return reasons;
}
function subjAlerts(sid){
  if(sid==='redacao')return redacaoReviewReasons().length>0?1:0;
  const sel=getM(sid).assuntosSelecionados||[];
  return sel.filter(tid=>{
    if(!getTopic(sid,tid))return false;
    return topicReviewReasons(sid,tid).length>0;
  }).length;
}
function subjSessWeek(sid){
  const since=new Date();since.setDate(since.getDate()-7);
  if(sid==='redacao')return D.redacao.sessoes.filter(s=>new Date(s.data)>=since).length;
  let n=0;
  const sel=getM(sid).assuntosSelecionados||[];
  sel.forEach(tid=>{
    if(!getTopic(sid,tid))return;
    AP_TYPES.forEach(at=>{
      (getTopic(sid,tid).apostilas[at.id].sessoes||[]).forEach(s=>{
        if(new Date(s.data)>=since)n++;
      });
    });
  });
  return n;
}
function totalWeek(){return SUBJECTS.reduce((a,s)=>a+subjSessWeek(s.id),0)}
function subjProgress(sid){
  // returns {selected, done} counts
  const sel=getM(sid)?.assuntosSelecionados||[];
  const done=sel.filter(tid=>getTopic(sid,tid)&&topicDone(getTopic(sid,tid))).length;
  return {selected:sel.length,done};
}

// ══════════════════════════════════════════════════════
// RENDER — PAINEL
// ══════════════════════════════════════════════════════
function renderPainel(){
  const el=document.getElementById('painelContent');
  const rows=SUBJECTS.map(s=>{
    const alerts=subjAlerts(s.id);
    const sessW=subjSessWeek(s.id);
    let statsHtml='';
    if(s.id==='redacao'){
      const sess=D.redacao.sessoes;
      const avg=sess.length?(sess.reduce((a,x)=>a+x.nota,0)/sess.length).toFixed(1):'—';
      statsHtml=`<span class="stat-pill">${sess.length} redaç${sess.length===1?'ão':'ões'}</span>
        <span class="stat-pill">Média ${avg}</span>`;
    }else{
      const {selected,done}=subjProgress(s.id);
      const pct=selected?Math.round((done/selected)*100):0;
      const circ=2*Math.PI*15;
      const offset=circ-circ*(selected?pct/100:0);
      const ringColor=pct===100?'var(--done)':s.color;
      statsHtml=`<span class="stat-pill">${selected} assunto${selected!==1?'s':''}</span>`;
      if(sessW)statsHtml+=`<span class="stat-pill">${sessW} sessão${sessW>1?'ões':''}/sem</span>`;
      var ringHtml=selected?`<div class="ring-wrap">
        <svg viewBox="0 0 36 36">
          <circle class="ring-bg" cx="18" cy="18" r="15"/>
          <circle class="ring-fill" cx="18" cy="18" r="15"
            stroke="${ringColor}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
          <text class="ring-text" x="18" y="18">${pct}%</text>
        </svg></div>`:'';
    }
    return `<div class="subj-card" onclick="openSubj('${s.id}')">
      <div class="sc-bar" style="background:${s.color}"></div>
      ${alerts?`<div class="badge-alert">${alerts} revisar</div>`:''}
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-name">${s.name}</div>
      <div class="sc-stats">${statsHtml}</div>
      ${s.id!=='redacao'?(ringHtml||''):''}
    </div>`;
  }).join('');
  el.innerHTML=`<div class="cards-grid" style="padding:.4rem 0 .8rem">${rows}</div>`;
}

// ══════════════════════════════════════════════════════
// RENDER — MATÉRIA
// ══════════════════════════════════════════════════════
function renderMateria(sid){
  const el=document.getElementById('materiaContent');
  const m=getM(sid);
  const sel=new Set(m.assuntosSelecionados||[]);
  const catalog=CATALOG[sid]||[];
  const s=SUBJECTS.find(x=>x.id===sid);

  // Catalog section
  let catItems=catalog.map(name=>{
    const k=topicKey(name);
    const checked=sel.has(k);
    return `<div class="cat-item" onclick="toggleTopic('${sid}','${k}','${esc(name)}')">
      <div class="cat-cb${checked?' checked':''}">
        ${checked?'✓':''}
      </div>
      <span class="cat-label">${name}</span>
    </div>`;
  }).join('');

  // Selected topics list
  const selArr=m.assuntosSelecionados||[];
  let topicsHtml='';
  if(!selArr.length){
    topicsHtml=`<div class="empty"><div class="ei">${s.icon}</div>
      <p>Selecione os assuntos acima para começar a acompanhar.</p></div>`;
  }else{
    topicsHtml=selArr.map(tid=>{
      const t=m.assuntos[tid];
      if(!t)return'';
      const done=topicDone(t);
      const pct=topicOverallPct(t);
      const alerts=topicReviewReasons(sid,tid).length;
      const concl=AP_TYPES.filter(at=>t.apostilas[at.id].concluido).length;
      return `<div class="topic-card${done?' done':''}" onclick="openTopic('${sid}','${tid}')">
        <div class="tc-dot" style="background:${done?'var(--done)':s.color}"></div>
        <div class="tc-info">
          <div class="tc-name${done?' done-text':''}">${t.nome}${alerts?' ⚠️':''}</div>
          <div class="tc-sub">${concl}/3 etapas${pct!==null?' · '+pct+'% acerto':''}</div>
        </div>
        <div class="tc-arr">›</div>
      </div>`;
    }).join('');
  }

  el.innerHTML=`
    <div class="catalog-section">
      <div class="catalog-toggle" onclick="toggleCatalog(this)">
        <span class="ct-icon">📋</span>
        <span class="ct-label">Catálogo de assuntos (${sel.size}/${catalog.length} selecionados)</span>
        <span class="ct-arrow">▾</span>
      </div>
      <div class="catalog-body">${catItems}</div>
    </div>
    <div class="sec-title">Assuntos em acompanhamento</div>
    ${topicsHtml}`;
}

function toggleCatalog(el){
  const body=el.nextElementSibling;
  body.classList.toggle('open');
  el.querySelector('.ct-arrow').classList.toggle('open');
}

function toggleTopic(sid,key,name){
  const m=getM(sid);
  const sel=m.assuntosSelecionados||[];
  const idx=sel.indexOf(key);
  if(idx===-1){
    // add to selected; create apostila data if not exists
    if(!m.assuntos[key]){
      m.assuntos[key]={nome:name,apostilas:makeApostilas()};
    }
    sel.push(key);
  }else{
    // deselect — keep data, just remove from selected
    sel.splice(idx,1);
  }
  m.assuntosSelecionados=sel;
  save();
  renderMateria(sid);
}

// ══════════════════════════════════════════════════════
// RENDER — ASSUNTO
// ══════════════════════════════════════════════════════
function renderAssunto(sid,tid){
  const el=document.getElementById('assuntoContent');
  const t=getTopic(sid,tid);
  const s=SUBJECTS.find(x=>x.id===sid);
  const done=topicDone(t);

  let html=`<div style="display:flex;align-items:center;gap:.6rem;margin-bottom:1rem">
    <span style="font-size:.78rem;font-weight:800;padding:.22rem .65rem;border-radius:99px;
      background:${done?'var(--done)22':'var(--surface2)'};color:${done?'var(--done)':'var(--muted)'}">
      ${done?'✅ Concluído':'Em andamento'}
    </span>
  </div>`;

  AP_TYPES.forEach(at=>{
    const ap=t.apostilas[at.id];
    const sess=ap.sessoes||[];
    const pct=at.hasScore?avgPct(sess):null;
    const conc=ap.concluido;

    const metricHtml=at.hasScore
      ?`<div class="ap-pct ${pctCls(pct)}">${pct!==null?pct+'%':'—'}</div>
        <div class="ap-pct-lbl">acerto médio</div>`
      :`<div class="ap-pct pct-na">${sess.length}</div>
        <div class="ap-pct-lbl">sessões</div>`;

    const sessHtml=!sess.length
      ?`<p style="color:var(--muted);font-size:.8rem;margin-bottom:.7rem">Nenhuma sessão ainda.</p>`
      :sess.map((s2,i)=>{
        const info=at.hasScore
          ?`${s2.acertos}/${s2.total} acertos — <strong>${Math.round((s2.acertos/s2.total)*100)}%</strong>`
          :(s2.observacao||'—');
        return `<div class="sess-item">
          <span class="sess-date">${fmtDate(s2.data)}</span>
          <span class="sess-info">${info}</span>
          <button class="sess-del" onclick="deleteSess('${sid}','${tid}','${at.id}',${i})">✕</button>
        </div>`;
      }).join('');

    html+=`<div class="apostila-block${conc?' done-block':''}" id="apblock-${at.id}">
      <div class="ap-head" onclick="toggleAp('${at.id}')">
        <div class="ap-icon">${at.icon}</div>
        <div class="ap-info">
          <div class="ap-type">${at.name}${conc?`<span class="ap-done-badge">✓ Concluído</span>`:''}</div>
          <div class="ap-name">${ap.nomeApostila||'Apostila não definida'}</div>
        </div>
        <div class="ap-metric">${metricHtml}</div>
        <div class="ap-arr" id="apar-${at.id}">▾</div>
      </div>
      <div class="ap-body" id="apbody-${at.id}">
        <div class="ap-name-row">
          <input class="ap-name-input" placeholder="Ex: Apostila 3 — capítulo 4"
            value="${ap.nomeApostila||''}"
            onchange="saveApName('${sid}','${tid}','${at.id}',this.value)">
        </div>
        <div class="session-list">${sessHtml}</div>
        <div class="conclude-row">
          <button class="btn-reg" onclick="openRegModal('${sid}','${tid}','${at.id}')">+ Registrar sessão</button>
          <button class="btn-conclude${conc?' concluded':''}"
            onclick="toggleConclude('${sid}','${tid}','${at.id}')">
            ${conc?'↩ Reabrir etapa':'✓ Concluí esta etapa'}
          </button>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML=html;
}

function toggleAp(atId){
  const b=document.getElementById('apbody-'+atId);
  const a=document.getElementById('apar-'+atId);
  b.classList.toggle('open');
  a.classList.toggle('open');
}

function saveApName(sid,tid,atId,val){
  getTopic(sid,tid).apostilas[atId].nomeApostila=val;
  save();
}

function toggleConclude(sid,tid,atId){
  const ap=getTopic(sid,tid).apostilas[atId];
  ap.concluido=!ap.concluido;
  save();
  renderAssunto(sid,tid);
  renderPainel();
  showToast(ap.concluido?'Etapa concluída! ✅':'Etapa reaberta.');
}

function deleteSess(sid,tid,atId,idx){
  getTopic(sid,tid).apostilas[atId].sessoes.splice(idx,1);
  save();
  renderAssunto(sid,tid);
}

// ══════════════════════════════════════════════════════
// RENDER — SESSION MODAL
// ══════════════════════════════════════════════════════
function openRegModal(sid,tid,atId){
  const at=AP_TYPES.find(x=>x.id===atId);
  const today=new Date().toISOString().split('T')[0];
  let body=`<div class="form-group">
    <label>Data</label>
    <input type="date" class="form-input" id="sd" value="${today}">
  </div>`;
  if(at.hasScore){
    body+=`<div class="form-row">
      <div class="form-group"><label>Total de questões</label>
        <input type="number" class="form-input" id="stot" min="1" placeholder="Ex: 20"></div>
      <div class="form-group"><label>Acertos</label>
        <input type="number" class="form-input" id="sacer" min="0" placeholder="Ex: 14"></div>
    </div>`;
  }else{
    body+=`<div class="form-group"><label>Observações (opcional)</label>
      <textarea class="form-input" id="sobs" placeholder="Ex: revisar conceito X…"></textarea>
    </div>`;
  }
  showModal(`Registrar sessão — ${at.name}`,body,[
    {label:'Cancelar',cls:'btn-sec',fn:'closeModal()'},
    {label:'Salvar',cls:'btn-pri',fn:`doReg('${sid}','${tid}','${atId}',${at.hasScore})`},
  ]);
}

function doReg(sid,tid,atId,hasScore){
  const dt=document.getElementById('sd').value;
  if(!dt){alert('Informe a data.');return}
  const sess=getTopic(sid,tid).apostilas[atId].sessoes;
  if(hasScore){
    const tot=parseInt(document.getElementById('stot').value);
    const ac=parseInt(document.getElementById('sacer').value);
    if(isNaN(tot)||isNaN(ac)||ac>tot){alert('Verifique total e acertos.');return}
    sess.push({data:dt,total:tot,acertos:ac});
  }else{
    const obs=document.getElementById('sobs').value;
    sess.push({data:dt,observacao:obs});
  }
  save();
  closeModal();
  renderAssunto(sid,tid);
  renderPainel();
  showToast('Sessão registrada!');
}

function renderRedacao(){
  const el=document.getElementById('materiaContent');
  const sess=D.redacao.sessoes;
  const avg=sess.length?(sess.reduce((a,s)=>a+s.nota,0)/sess.length).toFixed(1):null;
  const l3avg=sess.slice(0,3).length?(sess.slice(0,3).reduce((a,s)=>a+s.nota,0)/sess.slice(0,3).length).toFixed(1):null;

  let html='';
  if(avg){
    html+=`<div class="red-stats">
      <div class="red-stat">
        <div class="rs-lbl">Média geral</div>
        <div class="rs-val" style="color:${avg>=6?'#22c55e':'#ef4444'}">${avg}</div>
      </div>
      ${l3avg?`<div class="red-stat">
        <div class="rs-lbl">Últimas 3</div>
        <div class="rs-val" style="color:${l3avg>=6?'#22c55e':'#ef4444'}">${l3avg}</div>
      </div>`:''}
      <div class="red-stat">
        <div class="rs-lbl">Total</div>
        <div class="rs-val">${sess.length}</div>
      </div>
    </div>`;
  }
  if(!sess.length){
    html+=`<div class="empty"><div class="ei">📝</div><p>Nenhuma redação registrada ainda.</p></div>`;
  }else{
    html+=sess.map((s,i)=>`
      <div class="red-card">
        <div class="rc-nota" style="color:${s.nota>=6?'#22c55e':'#ef4444'}">${s.nota}</div>
        <div class="rc-tema">${s.tema||'Sem tema'}</div>
        <div class="rc-date">${fmtDate(s.data)}</div>
        <button class="rc-del" onclick="delRedacao(${i})">Excluir</button>
      </div>`).join('');
  }
  html+=`<button class="add-btn" onclick="addRedModal()">+ Nova redação</button>`;
  el.innerHTML=html;
}

function addRedModal(){
  const today=new Date().toISOString().split('T')[0];
  showModal('Nova redação',`
    <div class="form-group"><label>Data</label>
      <input type="date" class="form-input" id="rd" value="${today}"></div>
    <div class="form-group"><label>Tema</label>
      <input class="form-input" id="rtema" placeholder="Ex: Saúde pública no Brasil"></div>
    <div class="form-group"><label>Nota (0 a 10)</label>
      <input type="number" class="form-input" id="rnota" min="0" max="10" step="0.1" placeholder="Ex: 7.5"></div>
  `,[
    {label:'Cancelar',cls:'btn-sec',fn:'closeModal()'},
    {label:'Salvar',cls:'btn-pri',fn:'doAddRed()'},
  ]);
}
function doAddRed(){
  const dt=document.getElementById('rd').value;
  const tema=document.getElementById('rtema').value.trim();
  const nota=parseFloat(document.getElementById('rnota').value);
  if(!dt||isNaN(nota)||nota<0||nota>10){alert('Preencha data e nota (0–10).');return}
  D.redacao.sessoes.unshift({data:dt,tema,nota});
  save();closeModal();renderRedacao();renderPainel();showToast('Redação registrada!');
}
function delRedacao(i){
  if(!confirm('Excluir esta redação?'))return;
  D.redacao.sessoes.splice(i,1);save();renderRedacao();
}

// ══════════════════════════════════════════════════════
// RENDER — MINHA SEMANA
// ══════════════════════════════════════════════════════
function renderSemana(){
  const el=document.getElementById('semanaContent');
  const total=totalWeek();
  const nome=D.perfil==='malu'?'Malu':'Bruno';

  // review items
  const reviews=[];
  SUBJECTS.forEach(s=>{
    if(s.id==='redacao'){
      const r=redacaoReviewReasons();
      if(r.length)reviews.push({icon:s.icon,name:'Redação',reasons:r});
    }else{
      (getM(s.id).assuntosSelecionados||[]).forEach(tid=>{
        if(!getTopic(s.id,tid))return;
        const r=topicReviewReasons(s.id,tid);
        if(r.length)reviews.push({icon:s.icon,name:`${s.name} — ${getTopic(s.id,tid).nome}`,reasons:r});
      });
    }
  });

  // by subject
  const bySub=SUBJECTS.map(s=>({s,n:subjSessWeek(s.id)})).filter(x=>x.n>0)
    .sort((a,b)=>b.n-a.n);

  const bySubHtml=!bySub.length
    ?`<p style="color:var(--muted);font-size:.85rem">Nenhuma sessão esta semana.</p>`
    :bySub.map(x=>`<div class="bysub-item">
        <div class="bysub-dot" style="background:${x.s.color}"></div>
        <div class="bysub-name">${x.s.name}</div>
        <div class="bysub-count">${x.n} sessão${x.n>1?'ões':''}</div>
      </div>`).join('');

  const revHtml=!reviews.length
    ?`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
        padding:1.4rem;text-align:center;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:.4rem">✅</div>
        <div style="font-size:.88rem">Nada crítico no momento!</div>
      </div>`
    :reviews.map(r=>`<div class="review-item">
        <div class="ri-title">${r.icon} ${r.name}</div>
        <div class="ri-reason">${r.reasons.join(' · ')}</div>
      </div>`).join('');

  // redacao delta
  const rsess=D.redacao.sessoes;
  let redDelta='';
  if(rsess.length>=2){
    const diff=(rsess[0].nota-rsess[1].nota).toFixed(1);
    const cls=diff>0?'delta-up':diff<0?'delta-dn':'delta-ne';
    const sign=diff>0?'+':'';
    redDelta=`<div class="stat-card">
      <div class="sc-lbl">Redação — última nota</div>
      <div class="sc-val" style="color:${rsess[0].nota>=6?'#22c55e':'#ef4444'}">${rsess[0].nota}</div>
      <div class="sc-delta ${cls}">${sign}${diff} vs anterior</div>
    </div>`;
  }

  const gr=new Date().getHours()<12?'Bom dia':new Date().getHours()<18?'Boa tarde':'Boa noite';
  const em=total===0?'😴':total<5?'📖':total<10?'💪':'🔥';

  el.innerHTML=`
    <div class="week-hero">
      <div style="font-size:1.8rem;margin-bottom:.3rem">${em}</div>
      <h2>${gr}, ${nome}!</h2>
      <div class="wh-sub">Resumo dos últimos 7 dias</div>
      <div class="big-num">${total} <span>sessões esta semana</span></div>
    </div>
    <div class="stats2">
      <div class="stat-card">
        <div class="sc-lbl">Pontos a revisar</div>
        <div class="sc-val" style="color:${reviews.length?'#ef4444':'#22c55e'}">${reviews.length}</div>
        <div class="sc-delta ${reviews.length?'delta-ne':'delta-up'}">${reviews.length?'assuntos/matérias':'Tudo em dia!'}</div>
      </div>
      <div class="stat-card">
        <div class="sc-lbl">Matérias ativas</div>
        <div class="sc-val">${bySub.length}</div>
        <div class="sc-delta delta-ne">esta semana</div>
      </div>
    </div>
    ${redDelta}
    <div class="sec-title">Sessões por matéria</div>
    ${bySubHtml}
    <div class="sec-title">⚠️ Pontos a revisar</div>
    ${revHtml}
  `;
}

// ══════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════
function showModal(title,body,acts){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalActs').innerHTML=acts.map(a=>
    `<button class="${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('modalOv').classList.remove('hidden');
  setTimeout(()=>{const f=document.querySelector('.modal input,.modal textarea');if(f)f.focus()},80);
}
function closeModalOv(e){if(e.target===document.getElementById('modalOv'))closeModal()}
function closeModal(){document.getElementById('modalOv').classList.add('hidden')}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function pctCls(p){if(p===null)return'pct-na';if(p>=75)return'pct-g';if(p>=60)return'pct-m';return'pct-b'}
function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`}
function esc(s){return s.replace(/'/g,'\\x27')}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════════════
load();
if(D.perfil){startApp()}
else{document.getElementById('onboarding').style.display='flex'}
</script>
